version: "3.9"

# ============================================
# Skoolar — Full Self-Hosted Stack
# Deploy on Oracle Cloud Free Tier VM
# ============================================
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d postgres           # Start only database
#   docker compose logs -f                  # Follow logs
#
# Prerequisites:
#   - Docker & Docker Compose installed on Oracle VM
#   - .env file with all required variables
#   - Cloudflare Tunnel (cloudflared) for public access

services:

  # ─── Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skoolar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-skoolardb}
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost — access via Cloudflare Tunnel or Tailscale
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skoolar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    # Backup: pg_dump -h localhost -U skoolar skoolardb > backup.sql

  # ─── Next.js App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skoolar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-skoolardb}?sslmode=disable
      DATABASE_PROVIDER: pg
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      NEXT_PUBLIC_SUPER_ADMIN_EMAIL: ${NEXT_PUBLIC_SUPER_ADMIN_EMAIL}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@skoolar.org}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://llm:8080/v1}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://livekit.skoolar.org}
      SOCKET_PORT: 3003
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"  # Only localhost — Cloudflare Tunnel exposes publicly
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Socket.IO (Real-time) ────────────────────────────────────
  socketio:
    build:
      context: .
      dockerfile: Dockerfile.socketio
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SOCKET_PORT: 3003
      CORS_ORIGIN: ${NEXTAUTH_URL:-https://skoolar.org}
    ports:
      - "127.0.0.1:3003:3003"
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── LiveKit (Virtual Classrooms) ────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"       # Web/API (Cloudflare Tunnel)
      - "7881:7881"       # TCP TURN
      - "7882:7882/udp"   # UDP media (Cloudflare Tunnel — QUIC/HTTP2)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880/rtc/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command: >
      -n --listening-port=3478
      --min-port=50000 --max-port=50010
      --fingerprint --lt-cred-mech
      --realm=skoolar.live
      --user=${TURN_USER:-skoolar}:${TURN_SECRET:-skoolarsecret}
      --log-file=stdout
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── LLM (AI — Optional) ─────────────────────────────────────
  # Uncomment to run a local LLM via Ollama
  # llm:
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "127.0.0.1:8080:11434"  # Ollama API
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G
  #   # After starting: docker exec -it skoolar-llm-1 ollama pull mistral:7b
  #   # Then set: AI_PROVIDER=local, LOCAL_LLM_BASE_URL=http://llm:11434/v1

  # ─── Traefik (Reverse Proxy — Optional) ──────────────────────
  # Uncomment if you prefer Traefik over Cloudflare Tunnel for
  # internal service routing.
  # traefik:
  #   image: traefik:v3.0
  #   restart: unless-stopped
  #   command:
  #     - "--api.insecure=false"
  #     - "--providers.docker=true"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - "/var/run/docker.sock:/var/run/docker.sock:ro"
  #     - "traefik_letsencrypt:/letsencrypt"
  #   labels:
  #     - "traefik.http.routers.api.rule=Host(`traefik.skoolar.org`)"
  #     - "traefik.http.routers.api.service=api@internal"

volumes:
  postgres_data:
    driver: local
  # ollama_data:  # Uncomment if using local LLM
  # traefik_letsencrypt:  # Uncomment if using Traefik

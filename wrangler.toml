#:schema node_modules/wrangler/config-schema.json
name = "skoolar"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# Skoolar on Cloudflare Pages + R2
# ============================================
# Deploy: npm run cf:deploy
# Local dev: npm run cf:dev

# -------------------------------------------
# R2 Storage Binding
# -------------------------------------------
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "skoolar"

# -------------------------------------------
# Public (non-secret) Variables
# -------------------------------------------
[vars]
NEXTAUTH_URL = "https://www.skoolar.org"
NEXT_PUBLIC_CDN_URL = "https://cdn.skoolar.org"
R2_BUCKET_NAME = "skoolar"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
DATABASE_PROVIDER = "neon"
EMAIL_PROVIDER = "resend"
AI_PROVIDER = "openrouter"

# -------------------------------------------
# Development (wrangler dev)
# -------------------------------------------
[dev]
port = 8788
local_protocol = "http"

# -------------------------------------------
# Static Assets
# -------------------------------------------
[site]
bucket = ".open-next/assets"
